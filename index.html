<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Bank Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <section id="hubView">
      <div class="hero">
        <h1>Question Bank Practice Hub</h1>
        <p>
          Select any quiz to practice. Questions are loaded directly from the questions folder,
          so adding new quiz files in the same format automatically makes them available.
        </p>
        <div class="meta">
          <span class="pill" id="totalQuizzesPill">Quizzes: --</span>
          <span class="pill" id="totalQuestionsPill">Questions: --</span>
        </div>
      </div>
      <p class="status" id="hubStatus">Loading quiz files...</p>
      <div class="grid" id="quizGrid"></div>
    </section>

    <section id="quizView">
      <div style="margin-bottom:12px;">
        <button class="btn" id="backBtn">Back to Hub</button>
      </div>

      <div class="q-head">
        <div>
          <h2 id="quizTitle" style="margin:0 0 4px;font-size:1.4rem;"></h2>
          <div id="quizSubtitle" style="color:var(--muted);font-size:0.93rem;"></div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn" id="shuffleBtn">Shuffle</button>
          <button class="btn primary" id="restartBtn">Restart</button>
        </div>
      </div>

      <div class="filters" id="filters"></div>

      <div class="bar"><div id="progressBar"></div></div>

      <div class="stats">
        <div class="sbox">Question: <strong id="qIndex">1</strong> / <span id="qTotal">0</span></div>
        <div class="sbox">Correct: <strong class="ok" id="correctCount">0</strong></div>
        <div class="sbox">Wrong: <strong class="bad" id="wrongCount">0</strong></div>
      </div>

      <div id="quizMount"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
